# ============================================================
# Named volumes for persistent data
# ============================================================
volumes:
  postgres_data:
  redis_data:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  neo4j_plugins:
  rabbitmq_data:

# ============================================================
# Shared network
# ============================================================
networks:
  biochemai_net:
    driver: bridge

# ============================================================
# Services
# ============================================================
services:

  # ----------------------------------------------------------
  # PostgreSQL 15 — relational store for assay data, users, jobs
  # ----------------------------------------------------------
  postgres:
    build:
      context: ./docker
      dockerfile: postgres.dockerfile
    image: biochemai-postgres:15
    container_name: biochemai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-biochemai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-biochemai_postgres_pass}
      POSTGRES_DB: ${POSTGRES_DB:-biochemai_db}
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - biochemai_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-biochemai} -d ${POSTGRES_DB:-biochemai_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ----------------------------------------------------------
  # Redis 7 — descriptor cache, session store, FAISS index cache
  # ----------------------------------------------------------
  redis:
    image: redis:7-alpine
    container_name: biochemai_redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-biochemai_redis_pass}
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-biochemai_redis_pass}
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    networks:
      - biochemai_net
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a '$${REDIS_PASSWORD}' ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ----------------------------------------------------------
  # Neo4j 5 — biological knowledge graph
  # ----------------------------------------------------------
  neo4j:
    image: neo4j:5-community
    container_name: biochemai_neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/biochemai_neo4j_pass}
      NEO4J_PLUGINS: '["apoc", "graph-data-science"]'
      NEO4J_dbms_security_procedures_unrestricted: "apoc.*,gds.*"
      NEO4J_server_memory_heap_initial__size: "512m"
      NEO4J_server_memory_heap_max__size: "512m"
      NEO4J_server_memory_pagecache__size: "256m"
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/import
      - neo4j_plugins:/plugins
    ports:
      - "7474:7474"   # HTTP browser
      - "7687:7687"   # Bolt protocol
    networks:
      - biochemai_net
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 20s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ----------------------------------------------------------
  # RabbitMQ 3.12 — async task queue for docking / structure prediction
  # ----------------------------------------------------------
  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    container_name: biochemai_rabbitmq
    restart: unless-stopped
    user: "0:0"
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-biochemai}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-biochemai_rabbitmq_pass}
      RABBITMQ_DEFAULT_VHOST: ${RABBITMQ_VHOST:-biochemai_vhost}
      RABBITMQ_ERLANG_COOKIE: ${RABBITMQ_ERLANG_COOKIE:-biochemai_erlang_cookie_1234567890}
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"    # AMQP
      - "15672:15672"  # Management UI
    networks:
      - biochemai_net
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s

  # ----------------------------------------------------------
  # FastAPI Backend — core API, ML inference, graph queries
  # ----------------------------------------------------------
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    image: biochemai-backend:latest
    container_name: biochemai_backend
    restart: unless-stopped
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_USER: ${POSTGRES_USER:-biochemai}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-biochemai_postgres_pass}
      POSTGRES_DB: ${POSTGRES_DB:-biochemai_db}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-biochemai_redis_pass}
      REDIS_DB: 0
      # Neo4j
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-biochemai_neo4j_pass}
      # RabbitMQ
      RABBITMQ_URL: amqp://${RABBITMQ_DEFAULT_USER:-biochemai}:${RABBITMQ_DEFAULT_PASS:-biochemai_rabbitmq_pass}@rabbitmq:5672/${RABBITMQ_VHOST:-biochemai_vhost}
      # App
      SECRET_KEY: ${SECRET_KEY:-change-me-generate-strong-secret}
      ENVIRONMENT: ${ENVIRONMENT:-production}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      # External APIs
      CHEMBL_API_KEY: ${CHEMBL_API_KEY:-}
      NCBI_API_KEY: ${NCBI_API_KEY:-}
    ports:
      - "8000:8000"
    networks:
      - biochemai_net
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "--silent", "--fail", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ----------------------------------------------------------
  # Next.js Frontend — research dashboard
  # ----------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: biochemai-frontend:latest
    container_name: biochemai_frontend
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8000}
    ports:
      - "3000:3000"
    networks:
      - biochemai_net
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
